<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annuaire des membres - Mobilitous</title>
    <link rel="stylesheet" th:href="@{/css/charteGraphique.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/directory.css}">
    <link rel="stylesheet" th:href="@{/css/friendRequest.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-dark">

<div th:replace="~{fragments/header :: header-fragment}"></div>

<main class="directory-container">
    <section class="directory-hero card" role="search" aria-label="Recherche de membres">
        <div class="hero-inner">
            <h1>Retrouvez des pratiquants et structures</h1>
            <p>Recherchez des membres par nom, spécialité ou promotion, échangez des conseils et partagez vos sessions sportives.</p>

            <form th:action="@{/users/search}" method="get" class="search-bar-wrapper">
                <div class="search-input-group">
                    <i data-lucide="search" aria-hidden="true"></i>
                    <input id="directorySearch" type="text" name="query" placeholder="Rechercher par nom..." aria-label="Rechercher un membre par son nom">
                </div>
                <button type="submit" class="btn-publish">Rechercher</button>
            </form>
        </div>
    </section>

    <section class="filters-area" aria-label="Filtres de recherche">
        <div class="filter-row">
            <span class="filter-label" id="label-filiere">Filières:</span>
            <div class="filter-chips" role="group" aria-labelledby="label-filiere">
                <button class="chip active">Toutes</button>
                <button class="chip">Ingénieur Logiciel</button>
                <button class="chip">Data Science</button>
                <button class="chip">Cybersécurité</button>
                <button class="chip">Systèmes Embarqués</button>
            </div>
        </div>
        <div class="filter-row">
            <span class="filter-label" id="label-promo">Promo:</span>
            <div class="filter-chips" role="group" aria-labelledby="label-promo">
                <button class="chip active">Toutes</button>
                <button class="chip">2024</button>
                <button class="chip">2025</button>
                <button class="chip">2026</button>
                <button class="chip">2027</button>
                <button class="chip">2028</button>
            </div>
        </div>
    </section>

    <div class="section-header">
        <h2>Profils suggérés</h2>
        <div class="view-switcher" role="group" aria-label="Options d'affichage">
            <span>Affichage:</span>
            <button class="active" aria-label="Affichage en grille"><i data-lucide="layout-grid" aria-hidden="true"></i></button>
            <button aria-label="Affichage en liste"><i data-lucide="list" aria-hidden="true"></i></button>
        </div>
    </div>

    <div class="user-grid">
        <article th:each="u : ${users}" class="user-card card">
            <div class="user-card-top">
                <div class="avatar-container">
                    <img th:src="${u.profilePictureUrl != null ? u.profilePictureUrl : '/images/default-avatar.png'}"
                         class="avatar-directory"
                         alt="">
                    <span class="online-badge" aria-label="En ligne"></span>
                </div>
                <button class="btn-more-small" th:aria-label="'Voir les détails du profil de ' + ${u.firstName} + ' ' + ${u.lastName}">
                    <a th:href="@{'/profil/' + ${u.id}}" style="color: inherit; text-decoration: none; display: flex;" tabindex="-1">
                        <i data-lucide="more-vertical" aria-hidden="true"></i>
                    </a>
                </button>
            </div>

            <div class="user-card-body">
                <h3 th:text="${u.firstName} + ' ' + ${u.lastName}"></h3>
                <span class="user-promo-label" th:text="${u.profile != null ? 'Promo ' + u.profile.promoYear : 'Promo non renseignée'}"> </span>
                <p class="user-major-label" th:text="${u.profile?.isepSpecialization}"></p>
            </div>

            <div class="user-card-footer">
                <button th:if="${isConnect != null && u.id.toString() != isConnect.toString()}"
                        class="btn-friend-request"
                        th:data-id="${u.id}"
                        th:data-action="send"
                        th:aria-label="'Envoyer une demande de contact à ' + ${u.firstName} + ' ' + ${u.lastName}">
                    <i data-lucide="user-plus" aria-hidden="true"></i> Ajouter
                </button>

                <button th:if="${isConnect != null && u.id.toString() != isConnect.toString()}"
                        class="btn-msg-small"
                        th:data-id="${u.id}"
                        th:aria-label="'Envoyer un message privé à ' + ${u.firstName} + ' ' + ${u.lastName}">
                    <i data-lucide="message-square" aria-hidden="true"></i>
                </button>

                <button class="user-view" th:data-id="${u.id}" th:aria-label="'Consulter le profil de ' + ${u.firstName} + ' ' + ${u.lastName}">
                    <i data-lucide="eye" aria-hidden="true"></i>
                </button>
            </div>
        </article>
    </div>
</main>

<div id="customAlert" class="custom-alert-overlay" role="dialog" aria-modal="true" aria-labelledby="alertTitle" aria-describedby="alertMessage">
    <div class="custom-alert-card">
        <div class="alert-icon" id="alertIcon">
            <i data-lucide="info" aria-hidden="true"></i>
        </div>
        <h3 id="alertTitle">Notification</h3>
        <p id="alertMessage">Ceci est un message.</p>
        <button class="btn-alert-confirm" onclick="closeCustomAlert()">D'accord</button>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer-fragment}"></div>

<script>lucide.createIcons();</script>
<script th:src="@{/js/friendRequest.js}"></script>
<script th:src="@{/js/directory.js}"></script>

</body>
</html>
