<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Oubli de mot de passe - Mobilitous</title>

	<link rel="stylesheet" th:href="@{/css/charteGraphique.css}">
	<link rel="stylesheet" th:href="@{/css/header.css}">
	<link rel="stylesheet" th:href="@{/css/login.css}">

	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
	<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-dark">

<div th:replace="~{fragments/header :: header-fragment}"></div>

<div class="login-page">
	<main class="login-container">
		<div class="login-card glass-effect">

			<header class="login-header">
				<h2>Oubli de votre mot de passe</h2>
				<p class="subtitle">Indiquez votre adresse e-mail de connexion</p>
			</header>

			<form th:action="@{/forgotpassword/email}" th:object="${user}" method="post" class="login-form">

				<div class="alert-error" th:if="${error}" role="alert">
					<i data-lucide="alert-circle" aria-hidden="true"></i> <span th:text="${error}"></span>
				</div>

				<div class="alert-information" th:if="${information}" role="status">
					<i data-lucide="alert-circle" aria-hidden="true"></i> <span th:text="${information}"></span>
				</div>

				<div class="input-group">
					<label for="email">Adresse e-mail</label>
					<div class="input-wrapper">
						<i data-lucide="mail" class="input-icon" aria-hidden="true"></i>
						<input id="email" type="email" th:field="*{email}" placeholder="exemple@domaine.com" required />
					</div>
				</div>

				<button type="submit" class="btn-login-submit">
					<span>Continuer</span> <i data-lucide="arrow-right" aria-hidden="true"></i>
				</button>
			</form>

			<div class="login-footer">
				<a th:href="@{/}" class="back-home">
					<i data-lucide="chevron-left" aria-hidden="true"></i> Retour à l'accueil
				</a>
			</div>

		</div>
	</main>
</div>

<div th:replace="~{fragments/footer :: footer-fragment}"></div>

<script>
	lucide.createIcons();
</script>
</body>
</html>
