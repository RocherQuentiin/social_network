<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement de l'événement - Mobilitous</title>
    <link rel="stylesheet" th:href="@{/css/charteGraphique.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/project.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-dark">
<div th:replace="~{fragments/header :: header-fragment}"></div>

<main class="projects-container" style="max-width: 880px;">
    <input type="hidden" id="metaWalletBalance" th:value="${currentUserWalletBalance}">
    <input type="hidden" id="metaEventPrice" th:value="${event.price}">

    <section class="projects-section">
        <div class="project-card" style="display: grid; gap: 1.25rem;">
            <div>
                <span class="visibility paid-project-badge">Événement payant</span>
                <h1 style="margin-top: 1rem; color: var(--secondary);" th:text="${event.name}">Nom de l'événement</h1>
                <p class="description" th:text="${event.description}">Description</p>
            </div>

            <div class="metadata" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem;">
                <div class="card" style="padding: 1rem; background: var(--bg-muted);">
                    <p style="margin: 0; color: var(--text-dim); font-weight:600;">Montant à payer</p>
                    <strong style="font-size: 1.5rem; color: var(--secondary);" th:text="${#numbers.formatDecimal(event.price, 1, 2)} + ' EUR'">12.00 EUR</strong>
                </div>
                <div class="card" style="padding: 1rem; background: var(--bg-muted);">
                    <p style="margin: 0; color: var(--text-dim); font-weight:600;">Votre solde projet</p>
                    <strong style="font-size: 1.5rem; color: var(--primary);" th:text="${#numbers.formatDecimal(currentUserWalletBalance, 1, 2)} + ' EUR'">0.00 EUR</strong>
                </div>
                <div class="card" style="padding: 1rem; background: var(--bg-muted);">
                    <p style="margin: 0; color: var(--text-dim); font-weight:600;">Organisé par</p>
                    <strong style="color: var(--text-main);" th:text="${event.creator.firstName + ' ' + event.creator.lastName}">Créateur</strong>
                </div>
            </div>

            <form id="eventPaymentForm" class="project-payment-form" novalidate>
                <input type="hidden" id="paymentEventId" th:value="${event.id}">
                <input type="hidden" id="paymentReturnTo" th:value="${returnTo}">

                <div class="modal-header project-payment-form-header">
                    <h3>Règlement sécurisé</h3>
                    <a class="project-payment-cancel" th:href="${returnTo}">Annuler</a>
                </div>

                <div class="payment-mode-block">
                    <p class="payment-mode-heading">Mode de paiement</p>
                    <div class="payment-mode-grid">
                        <label class="payment-mode-tile">
                            <input type="radio" name="paymentMode" value="new" checked>
                            <span class="payment-mode-tile-inner">
                                    <span class="payment-mode-indicator" aria-hidden="true"></span>
                                    <span class="payment-mode-label">Nouvelle carte bancaire</span>
                                </span>
                        </label>
                        <label class="payment-mode-tile">
                            <input type="radio" name="paymentMode" value="saved" id="modeSavedRadio">
                            <span class="payment-mode-tile-inner">
                                    <span class="payment-mode-indicator" aria-hidden="true"></span>
                                    <span class="payment-mode-label">Carte enregistrée</span>
                                </span>
                        </label>
                        <label class="payment-mode-tile">
                            <input type="radio" name="paymentMode" value="wallet" id="modeWalletRadio">
                            <span class="payment-mode-tile-inner">
                                    <span class="payment-mode-indicator" aria-hidden="true"></span>
                                    <span class="payment-mode-label">Payer avec mon solde virtuel Mobilitous</span>
                                </span>
                        </label>
                    </div>
                </div>

                <div id="walletPaySection" class="payment-wallet-notice" style="display:none;">
                    <p id="walletPayHint">Le montant sera directement débité de votre portefeuille virtuel sport.</p>
                </div>

                <div id="savedCardSection" class="payment-saved-section" style="display:none;">
                    <div class="form-group">
                        <label for="savedMethodSelect">Choisir une carte enregistrée</label>
                        <select id="savedMethodSelect"></select>
                    </div>
                    <div class="form-group">
                        <label for="savedCvv">Code CVV (3 chiffres au dos)</label>
                        <input type="password" id="savedCvv" maxlength="4" inputmode="numeric" placeholder="•••">
                    </div>
                </div>

                <div id="newCardSection" class="payment-new-card-section">
                    <div class="form-group">
                        <label for="cardholderName">Nom du titulaire de la carte</label>
                        <input type="text" id="cardholderName" placeholder="Ex: Marie Patin">
                    </div>
                    <div class="form-group">
                        <label for="cardNumber">Numéro de carte bancaire</label>
                        <input type="text" id="cardNumber" inputmode="numeric" placeholder="4532 •••• •••• ••••">
                    </div>
                    <div class="payment-expiry-row">
                        <div class="form-group">
                            <label for="expiryMonth">Mois d'expiration</label>
                            <input type="number" id="expiryMonth" min="1" max="12" placeholder="MM">
                        </div>
                        <div class="form-group">
                            <label for="expiryYear">Année d'expiration</label>
                            <input type="number" id="expiryYear" min="2026" placeholder="AAAA">
                        </div>
                        <div class="form-group">
                            <label for="cvv">Code CVV</label>
                            <input type="password" id="cvv" inputmode="numeric" maxlength="4" placeholder="•••">
                        </div>
                    </div>
                    <div class="form-group payment-save-card-row">
                        <label class="payment-checkbox-label">
                            <input type="checkbox" id="savePaymentMethod">
                            <span>Enregistrer cette carte en toute sécurité sur mon profil</span>
                        </label>
                    </div>
                </div>

                <div class="actions project-payment-actions">
                    <button type="submit" class="btn-primary-large" id="paySubmitBtn" th:text="'Payer ' + ${#numbers.formatDecimal(event.price, 1, 2)} + ' EUR'">Payer</button>
                </div>
            </form>
        </div>
    </section>
</main>

<script th:src="@{/js/eventPayment.js}"></script>
<div th:replace="~{fragments/footer :: footer-fragment}"></div>
</body>
</html>
