<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messagerie - Mobilitous</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/charteGraphique.css}">
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/messages.css}">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body class="bg-dark">
<input type="hidden" id="currentUserId" th:value="${userId}">

<div th:replace="~{fragments/header :: header-fragment}"></div>

<div class="messaging-container">
    <aside class="conversations-sidebar" aria-label="Liste des conversations">
        <div class="sidebar-header">
            <h2>Messages</h2>
            <button class="btn-new-conversation" id="newMessageBtn" title="Nouvelle conversation" aria-label="Commencer une nouvelle conversation">
                <i class="fas fa-plus" aria-hidden="true"></i>
            </button>
        </div>

        <div class="message-tabs" role="tablist" aria-label="Type de discussions">
            <button class="tab-btn active" data-tab="private" role="tab" aria-selected="true" aria-controls="privateTab" id="tab-private">
                <i class="fas fa-user" aria-hidden="true"></i> Privé
            </button>
            <button class="tab-btn" data-tab="projects" role="tab" aria-selected="false" aria-controls="projectsTab" id="tab-projects">
                <i class="fas fa-users" aria-hidden="true"></i> Clubs & Sports
            </button>
        </div>

        <div class="search-box">
            <input type="text" id="conversationSearch" placeholder="Chercher une conversation..." class="input-field" aria-label="Rechercher une conversation existante">
        </div>

        <div id="privateTab" class="tab-content active" role="tabpanel" aria-labelledby="tab-private">
            <div id="conversationsList" class="conversations-list">
            </div>
        </div>

        <div id="projectsTab" class="tab-content" style="display: none;" role="tabpanel" aria-labelledby="tab-projects">
            <div class="project-groups-header">
                <select id="projectSelector" class="input-field" aria-label="Filtrer par club ou sport">
                    <option value="">Sélectionner un projet / club</option>
                </select>
                <button id="createGroupBtn" class="btn-create-group" title="Créer un groupe de discussion" aria-label="Créer un sous-groupe de discussion">
                    <i class="fas fa-plus" aria-hidden="true"></i>
                </button>
            </div>
            <div id="projectGroupsList" class="conversations-list">
            </div>
        </div>
    </aside>

    <main class="chat-area" aria-label="Zone de discussion active">
        <div id="noChatSelected" class="empty-state">
            <div class="empty-icon">
                <i class="fas fa-comment-dots" aria-hidden="true"></i>
            </div>
            <h3>Aucune conversation sélectionnée</h3>
            <p>Sélectionnez une conversation ou commencez une nouvelle discussion</p>
        </div>

        <div id="chatWindow" class="chat-window" style="display: none;">
            <div class="chat-header">
                <button class="btn-back-mobile" id="btnBackToConversations" title="Retour aux conversations" aria-label="Retourner à la liste des conversations">
                    <i class="fas fa-arrow-left" aria-hidden="true"></i>
                </button>
                <img id="otherUserAvatar" class="avatar-small" src="" alt="">
                <div class="chat-header-info">
                    <h3 id="chatHeaderName"></h3>
                    <span id="chatStatus" class="status">En ligne</span>
                </div>
                <span id="chatType" class="chat-type-badge" style="display: none;"></span>
            </div>

            <div id="messagesContainer" class="messages-container" aria-live="polite" aria-label="Flux des messages">
            </div>

            <div class="message-input-area">
                <textarea id="messageInput" placeholder="Écrivez votre message..." rows="2" class="message-textarea" aria-label="Saisir votre message"></textarea>
                <button id="sendMessageBtn" class="btn-send primary">
                    <i class="fas fa-paper-plane" aria-hidden="true"></i> Envoyer
                </button>
            </div>
        </div>
    </main>

    <aside class="notifications-sidebar" aria-label="Fil d'actualité des notifications">
        <div class="sidebar-header">
            <h2>Notifications</h2>
            <span id="unreadCount" class="badge" aria-label="Nombre de notifications non lues">0</span>
        </div>

        <button id="markAllReadBtn" class="btn-mark-all-read">
            Marquer tout comme lu
        </button>

        <div id="notificationsList" class="notifications-list">
        </div>
    </aside>
</div>

<div id="newConversationModal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="modalNewChatTitle">
    <div class="modal-content glass-card">
        <div class="modal-header">
            <h2 id="modalNewChatTitle">Nouvelle conversation</h2>
            <button class="btn-modal-close" id="closeModalBtn" aria-label="Fermer la boîte de dialogue">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label for="userSearch">Chercher un utilisateur ou une structure sportive</label>
                <div class="search-wrapper">
                    <input type="text" id="userSearch" placeholder="Nom, email ou @username..." class="input-field">
                    <i class="fas fa-search search-icon" aria-hidden="true"></i>
                </div>
                <div id="userSearchResults" class="search-results"></div>
            </div>
        </div>
    </div>
</div>

<div id="createGroupModal" class="modal-overlay" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="modalNewGroupTitle">
    <div class="modal-content glass-card">
        <div class="modal-header">
            <h2 id="modalNewGroupTitle">Créer un groupe de discussion</h2>
            <button class="btn-modal-close" id="closeGroupModalBtn" aria-label="Fermer la boîte de dialogue">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label for="groupProjectSelect">Projet / Club rattaché</label>
                <select id="groupProjectSelect" class="input-field" required>
                    <option value="">Sélectionner un projet / club</option>
                </select>
            </div>
            <div class="form-group">
                <label for="groupName">Nom du groupe de discussion</label>
                <input type="text" id="groupName" class="input-field" placeholder="Ex: Entraînements, Général, Accessibilité..." required>
            </div>
            <div class="form-group">
                <label for="groupDescription">Description (optionnelle)</label>
                <textarea id="groupDescription" class="input-field" rows="3" placeholder="Description du groupe de discussion..."></textarea>
            </div>
            <button id="confirmCreateGroupBtn" class="btn-send primary" style="width: 100%;">
                Créer le groupe
            </button>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer-fragment}"></div>
<script th:src="@{/js/chat.js}"></script>
<script th:src="@{/js/project-chat.js}"></script>
</body>
</html>
