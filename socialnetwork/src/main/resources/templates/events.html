<div th:fragment="events-fragment">
	<h2 class="events-main-title">Annonces à la une</h2>

	<article th:each="event : ${events}"
	         th:with="attendee=${!#lists.isEmpty(event.eventAttendee.?[user.id == #vars.isConnect and status != 'DECLINED'])},
                      acceptedCount=${#lists.size(event.eventAttendee.?[status.toString() == 'ACCEPTED'])}"
	         class="event-card">

		<!-- CORPS SUPÉRIEUR -->
		<div class="event-card-body">

			<div class="event-card-header">
				<h3 th:text="${event.name}" class="event-title"></h3>
				<span th:if="${event.isPaid}" class="event-paid-badge">
                    <i data-lucide="credit-card" aria-hidden="true"></i>
                    <span th:text="${#numbers.formatDecimal(event.price, 1, 2)} + ' €'"></span>
                </span>
			</div>

			<p class="event-creator">
				Organisé par <strong th:text="${event.creator.firstName + ' ' + event.creator.lastName}"></strong>
			</p>

			<div class="event-description">
				<p th:text="${event.description}"></p>
			</div>

			<div class="event-grid-info">
				<p class="info-item">
					<i data-lucide="map-pin" aria-hidden="true"></i>
					<span><span class="info-label">Lieu </span><span th:text="${event.location}"></span></span>
				</p>
				<p class="info-item">
					<i data-lucide="users" aria-hidden="true"></i>
					<span><span class="info-label">Places </span><span th:text="${event.capacity}"></span> dispo.</span>
				</p>
				<p class="info-item">
					<i data-lucide="calendar" aria-hidden="true"></i>
					<span><span class="info-label">Date </span><span class="event-date-period" th:attr="data-timestamp=${event.eventDate}"></span></span>
				</p>
				<p class="info-item">
					<i data-lucide="eye" aria-hidden="true"></i>
					<span><span class="info-label">Visibilité </span><span th:text="${event.visibilityType}"></span></span>
				</p>
			</div>

		</div>

		<!-- PARTICIPANTS -->
		<div class="event-participants">
			<h4 class="participants-label">Participants</h4>
			<div class="participants-list">

                <span th:each="participant : ${event.eventAttendee}"
                      th:if="${participant.status.toString() == 'ACCEPTED' || (participant.status.toString() == 'PENDING' && !event.isPaid)}"
                      class="participant-tag">
                    <i data-lucide="user" aria-hidden="true" style="width:12px;height:12px;stroke-width:2px;"></i>
                    <span th:text="${participant.user.firstName + ' ' + participant.user.lastName}"></span>
                    <span th:if="${participant.status.toString() == 'PENDING'}"
                          class="participant-status-pending">En attente</span>
                    <span th:if="${participant.status.toString() == 'PENDING' && event.creator.id == isConnect}"
                          class="participant-actions">
                        <button type="button" class="btn-event-action btn-event-accept"
                                th:attr="data-requester-id=${participant.user.id}, data-event-id=${event.id}"
                                th:aria-label="'Accepter ' + ${participant.user.firstName}"
                                onclick="acceptEventAttendeeFromBtn(this)">
                            <i data-lucide="check" style="width:11px;height:11px;"></i>
                        </button>
                        <button type="button" class="btn-event-action btn-event-decline"
                                th:attr="data-requester-id=${participant.user.id}, data-event-id=${event.id}"
                                th:aria-label="'Refuser ' + ${participant.user.firstName}"
                                onclick="declineEventAttendeeFromBtn(this)">
                            <i data-lucide="x" style="width:11px;height:11px;"></i>
                        </button>
                    </span>
                </span>

				<span th:if="${#lists.isEmpty(event.eventAttendee)}" class="empty-participants-text">
                    Aucun participant pour le moment.
                </span>
			</div>
		</div>

		<!-- FOOTER ACTIONS -->
		<div class="event-footer">

			<!-- Rejoindre gratuit -->
			<a th:if="${event.creator.id != isConnect && acceptedCount < event.capacity && !attendee && !event.isPaid}"
			   th:attr="data-id=${event.id}"
			   class="btn-event-main btn-join-event">
				<i data-lucide="user-plus" aria-hidden="true" style="width:15px;height:15px;"></i>
				Rejoindre
				<span class="sr-only" th:text="' - ' + ${event.name}"></span>
			</a>

			<!-- Rejoindre payant -->
			<a th:if="${event.creator.id != isConnect && acceptedCount < event.capacity && !attendee && event.isPaid}"
			   class="btn-join-paid"
			   th:href="@{/event/{id}/payment(id=${event.id})} + '?returnTo=/feed'">
				<i data-lucide="credit-card" aria-hidden="true" style="width:15px;height:15px;"></i>
				Rejoindre (payant)
				<span class="sr-only" th:text="' - ' + ${event.name}"></span>
			</a>

			<!-- Demandes (créateur, événement gratuit) -->
			<button type="button"
			        th:if="${event.creator.id == isConnect && !event.isPaid}"
			        class="btn-event-secondary"
			        th:id="'event-requests-btn-' + ${event.id}"
			        th:attr="data-event-id=${event.id}"
			        onclick="showEventRequests(this.getAttribute('data-event-id'))">
				<i data-lucide="users" aria-hidden="true" style="width:14px;height:14px;"></i>
				Demandes
			</button>

			<!-- Spacer -->
			<div class="event-footer-spacer"></div>

			<!-- Éditer (icône) -->
			<a th:if="${event.creator.id == isConnect}"
			   class="btn-event-icon editEventModal"
			   th:attr="data-id=${event.id}, data-name=${event.name}, data-date=${event.eventDate},
                        data-capacity=${event.capacity}, data-location=${event.location},
                        data-visibility=${event.visibilityType}, data-description=${event.description}"
			   th:aria-label="'Éditer ' + ${event.name}"
			   style="cursor:pointer;">
				<i data-lucide="pencil" aria-hidden="true"></i>
			</a>

			<!-- Supprimer (icône) -->
			<button type="button"
			        th:if="${event.creator.id == isConnect}"
			        class="btn-event-icon danger"
			        th:attr="data-event-id=${event.id}, data-event-name=${event.name}"
			        th:aria-label="'Supprimer ' + ${event.name}"
			        onclick="deleteEventFromBtn(this)">
				<i data-lucide="trash-2" aria-hidden="true"></i>
			</button>

			<!-- Quitter -->
			<a th:if="${event.creator.id != isConnect && attendee}"
			   th:attr="data-id=${event.id}"
			   class="btn-event-danger btn-quit"
			   style="cursor:pointer;">
				<i data-lucide="log-out" aria-hidden="true" style="width:14px;height:14px;"></i>
				Quitter
				<span class="sr-only" th:text="' - ' + ${event.name}"></span>
			</a>

		</div>
	</article>
</div>
