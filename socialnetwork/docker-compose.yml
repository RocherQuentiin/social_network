version: '3.9'

services:
  socialnetwork-db:
    image: mariadb:11.8
    container_name: socialnetwork-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: socialnetwork
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    depends_on:
      - socialnetwork-db
    environment:
      PMA_HOST: socialnetwork-db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"

  app:
    build: .
    depends_on:
      socialnetwork-db:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      PASSWORD_MAIL: ${PASSWORD_MAIL}

  # 在容器里跑 Maven（本机未装 mvn 时用）。访问 http://localhost:8080
  # 启动：docker compose --profile dev up app-dev
  app-dev:
    profiles: ["dev"]
    image: maven:3.9.4-eclipse-temurin-17
    container_name: socialnetwork-app-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8080:8080"
    depends_on:
      socialnetwork-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://socialnetwork-db:3306/socialnetwork
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_PROFILES_ACTIVE: dev
      PASSWORD_MAIL: ${PASSWORD_MAIL:-}
    command: ["mvn", "-DskipTests", "spring-boot:run"]

volumes:
  mariadb_data:
